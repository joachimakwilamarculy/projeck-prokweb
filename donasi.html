<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Donasi - BantuSesama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BantuSesama</h1>
          <nav><a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">Batal</a></nav>
    </header>

    <main style="padding: 20px;">
        <div style="text-align: center;">
            <h2>Konfirmasi Donasi</h2>
            <p>Anda mendonasikan untuk: <strong>Beasiswa Anak Pelosok</strong></p>
        </div>

        <form onsubmit="alert('Terima kasih! Bukti transfer Anda telah diterima dan akan diverifikasi.'); window.location.href='index.html'; return false;">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Nama sesuai KTP" required>

            <label>Email Aktif</label>
            <input type="email" placeholder="email@contoh.com" required>

            <label>Nominal Donasi (Rp)</label>
            <input type="number" min="10000" placeholder="Min. Rp 10.000" required>

            <label>Metode Pembayaran</label>
            <select required>
                <option value="">Pilih Metode</option>
                <option>Bank Central Asia (BCA)</option>
                <option>Bank Mandiri</option>
                <option>E-Wallet (GoPay/OVO)</option>
            </select>

            <label>Pesan Dukungan (Opsional)</label>
            <textarea rows="3" placeholder="Tulis doa atau kata penyemangat..."></textarea>

            <label>Upload Bukti Transfer (PDF/JPG/PNG)</label>
            <input type="file" accept=".pdf,.jpg,.png" required>

            <button type="submit" class="btn" style="margin-top: 20px; background: #27ae60;">Kirim Donasi</button>
        </form>
    </main>

    <footer></footer>
</body>
</html>
